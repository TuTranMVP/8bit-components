name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4 # reads "packageManager" from package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint + syntax
        run: pnpm check

      - name: Rebuild bundle + AI docs
        run: pnpm build

      - name: Fail if committed build artifacts are stale
        run: git diff --exit-code -- all.min.css elements.min.js llms.txt llms-full.txt components.json

      - name: Verify publish contents (dry run)
        run: npm pack --dry-run
