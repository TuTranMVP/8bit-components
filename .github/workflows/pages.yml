name: Deploy docs

# Publishes the docs site (docs.html + demo) to GitHub Pages on every push to main.
# Enable once in repo Settings → Pages → Source: GitHub Actions.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Assemble static site
        run: |
          mkdir -p _site
          cp index.html docs.html demo.html docs.js \
             all.css all.min.css tokens.css base.css components.css \
             elements.js elements.min.js icons.js icons.min.js \
             llms.txt llms-full.txt components.json \
             og.png robots.txt sitemap.xml _site/
          cp -r fonts _site/fonts
          cp -r examples _site/examples

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deploy
        uses: actions/deploy-pages@v4
