name: Release

# Flow: bump version in package.json → commit → `git tag vX.Y.Z` → `git push --follow-tags`
# This workflow publishes that tag to npm with provenance (supply-chain attestation).

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile

      - name: Gate — lint + syntax must pass
        run: pnpm check

      - name: Guard — tag must match package.json version
        run: |
          PKG_V=$(node -p "require('./package.json').version")
          TAG_V="${GITHUB_REF_NAME#v}"
          if [ "$PKG_V" != "$TAG_V" ]; then
            echo "::error::Tag v$TAG_V != package.json $PKG_V"; exit 1
          fi

      - name: Publish to npm (with provenance)
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
